<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f7f1df" />
  <meta name="description" content="simple budget app" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <title>Stack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/icon-192.png">
</head>
<body>
  <div id="available-toast" class="available-toast" aria-hidden="true">
    <div class="available-amount available-toast-card">
      <span id="available-toast-value">$0</span>
    </div>
  </div>
  <main class="container app-shell">
    <header class="app-hero">
      <div class="hero-topline">
      </div>
      <div class="available-amount hero-available">
        <span id="available">$0</span>
      </div>
    </header>

    <section class="stack-meta">
      <div id="account-cards" class="account-cards"></div>
    </section>

    <section class="planning-panel">
      <div id="planning-list" class="planning-list"></div>
    </section>

    <div class="site-logo-wrap">
      <div id="empty-planning-hint" class="empty-planning-hint" hidden>Now add a budget item...</div>
      <a class="site-logo-link" href="https://github.com/tinykings/stack" target="_blank" rel="noreferrer">
        <img class="site-logo" src="images/logo.webp" alt="Site logo" loading="lazy" decoding="async">
      </a>
      <div id="empty-accounts-hint" class="empty-accounts-hint" hidden>Add an account to get started</div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>

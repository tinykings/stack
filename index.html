<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#141414" />
  <meta name="description" content="simple budget app" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <title>Stack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/icon-192.png">
</head>
<body>
  <div id="available-banner" class="available-banner" aria-hidden="true">
    <div class="available-banner-inner">
      <span class="available-banner-label">Available</span>
      <span id="available-banner-value" class="available-banner-value">$0</span>
    </div>
  </div>
  <main class="container app-shell">
    <header class="app-hero">
      <div class="hero-topline">
      </div>
      <div class="available-amount hero-available">
        <span id="available">$0</span>
      </div>
    </header>

    <section class="stack-meta">
      <div id="account-cards" class="account-cards"></div>
    </section>

    <section class="planning-panel">
      <div id="planning-list" class="planning-list"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>

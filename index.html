<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#141414" />
  <meta name="description" content="simple budget app" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget" />
  <title>Stack</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icon-192.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/icon-192.png">
</head>
<body>
  <main class="container app-shell">
    <header class="app-hero">
      <div class="hero-topline">
      </div>
      <div class="available-amount hero-available">
        <span id="available">$0.00</span>
      </div>
    </header>

    <section class="stack-meta">
      <div id="account-cards" class="account-cards"></div>
    </section>

    <section class="planning-panel">
      <div id="planning-list" class="planning-list"></div>
    </section>

    <div class="footer-bar">
      <div id="footer-last-action" class="footer-last-action footer-log" style="display:none;"></div>
      <div class="footer-right">
        <button id="sync-btn" class="detail-add-btn" title="Settings" aria-label="Settings">⚙</button>
        <button id="autofill-btn" class="detail-add-btn" title="Auto Fill" aria-label="Auto Fill">↯</button>
        <button id="add-planning-btn" class="detail-add-btn" type="button" aria-label="Add item">＋</button>
      </div>
    </div>

    <div id="gist-modal" class="modal-overlay center-overlay" style="display:none;">
      <div class="modal">
        <h3>Settings</h3>
        <div class="gist-controls">
          <input id="gistId" placeholder="Gist ID">
          <input id="gistToken" placeholder="GitHub token (Gist scope)" type="password">
          <div class="gist-buttons">
            <button id="saveGist">Save to Gist</button>
            <button id="loadGist">Load from Gist</button>
          </div>
          <div id="status" class="status"></div>
        </div>
        <div class="settings-section">
          <h4>Manage Accounts</h4>
          <div class="settings-actions-row">
            <button id="add-account-settings-btn" class="backup-btn">Add Account</button>
          </div>
          <div id="settings-accounts-list" class="settings-account-list"></div>
        </div>
        <div class="backup-section">
            <h4>Backup & Restore</h4>
            <div class="backup-buttons">
                <button id="export-btn" class="backup-btn">Export Data</button>
                <button id="import-btn" class="backup-btn">Import Data</button>
                <input type="file" id="import-file" accept=".json" style="display:none">
            </div>
            <small>Export saves a backup file. Import restores from a backup file.</small>
        </div>
        <div class="actions">
            <button id="gist-modal-close">Close</button>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
